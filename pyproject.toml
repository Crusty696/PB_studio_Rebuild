[tool.poetry]
name = "pb-studio-rebuild"
version = "0.4.0"
description = "DaVinci Resolve Style Video/Audio Production Studio"
authors = ["Your Name <you@example.com>"]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.11,<3.13"
pyside6 = ">=6.8.0,<7.0.0"
sqlalchemy = ">=2.0.40,<3.0.0"
librosa = ">=0.11.0,<0.12.0"
numpy = ">=2.1.0,<3.0.0"
demucs = ">=4.0.1,<5.0.0"
opencv-python = ">=4.10.0,<5.0.0"
scipy = ">=1.14.0,<2.0.0"
transformers = ">=4.47.0,<6.0.0"
thefuzz = ">=0.22.1,<0.23.0"
faster-whisper = ">=1.1.0,<2.0.0"
einops = ">=0.8.0,<0.9.0"
pillow = ">=11.0.0,<13.0.0"
accelerate = ">=1.2.0,<2.0.0"
opentimelineio = ">=0.18.0,<1.0.0"
pyarrow = ">=18.0.0,<24.0.0"
python-dotenv = ">=1.0.0,<2.0.0"
scenedetect = ">=0.6.0,<1.0.0"
sounddevice = ">=0.5.0,<1.0.0"
soundfile = ">=0.12.0,<1.0.0"
click = "<8.4.0"
beat-this = {git = "https://github.com/CPJKU/beat_this.git", rev = "c8c320e84f1a4e5b291327debe754734ea802afc"}
torch = {version = ">=2.6.0,<3.0.0", source = "pytorch"}
torchvision = {version = ">=0.21.0,<1.0.0", source = "pytorch"}
torchaudio = {version = ">=2.6.0,<3.0.0", source = "pytorch"}

[tool.poetry.group.dev.dependencies]
pytest = ">=9.0.2,<10.0.0"

[[tool.poetry.source]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu124"
priority = "explicit"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
