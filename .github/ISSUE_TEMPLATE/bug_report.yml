name: Bug Report
description: Report a bug or unexpected behavior in PB Studio
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us diagnose and fix the issue.

  - type: input
    id: version
    attributes:
      label: PB Studio Version
      description: What version of PB Studio are you running?
      placeholder: "e.g., v1.0.0 or git commit hash"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      options:
        - Windows 11
        - Windows 10
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open PB Studio
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe actual behavior...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Please paste relevant error logs from `logs/` directory
      placeholder: Paste logs here...
      render: shell

  - type: textarea
    id: system
    attributes:
      label: System Information
      description: |
        Please provide:
        - GPU model (if applicable)
        - Available RAM
        - Python version (`python --version`)
        - CUDA version (if using GPU, run `nvidia-smi`)
      placeholder: |
        GPU: NVIDIA RTX 3060
        RAM: 16GB
        Python: 3.11.5
        CUDA: 12.1

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or videos about the problem
