name: CI

on:
  push:
    # B-037: master ergaenzt — Repo nutzt master als Default-Branch,
    # ohne diesen Eintrag lief CI bei keinem Master-Push.
    branches: ["main", "master", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint  (fast, runs on Linux, no heavy deps)
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --output-format=github

      # NOTE: `ruff format --check` wurde bewusst entfernt. Die Codebase nutzt
      # umfangreiche Source-Inspection-Tests (inspect.getsource + assert auf
      # exakten Quelltext). Ein repo-weites `ruff format` schreibt u.a.
      # Operator-Spacing um (z.B. `2 ** attempt` -> `2**attempt`) und bricht
      # diese Tests. Lint-Korrektheit (E/F/W/I) bleibt via `ruff check` oben
      # erzwungen; reines Format ist hier kein Gate.

      - name: Run bandit security scan
        # B-037: ``-c bandit.yaml`` laed die Repo-Config (exclude_dirs +
        # B101/B310-skip + nosec-Markierungen). ``-ll`` blocked Medium +
        # High Severity — der B-037-Folgesprint hat Medium auf 0 gebracht
        # (28 -> 0 via per-line nosec + project-wide skip B310).
        run: |
          pip install bandit
          bandit -r . -c bandit.yaml -ll

  # ──────────────────────────────────────────────
  # 2. Unit tests  (Windows, CPU-only deps)
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU-only PyTorch first
        # Avoid pulling the 5 GB CUDA wheel from the private source.
        # CPU wheel is sufficient for unit tests that mock model inference.
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies (no torch from poetry source)
        # shell: bash, damit ein Fehlschlag nicht durch eine Pipe maskiert wird.
        # Frueher: `poetry install --without-extras` (ungueltiges Flag) `| grep`
        # -> poetry brach ab, der Pipe-Exit (grep) war aber 0, Step wurde gruen,
        # ABER pytest/Deps fehlten ("No module named pytest").
        shell: bash
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          # CPU-torch ist bereits installiert und erfuellt den >=1.10.0-Constraint
          # -> poetry ueberspringt es. --no-root: package-mode=false, kein Self-Install.
          poetry install --no-interaction --no-root
          # Test-only Tooling, das nicht in den poetry-dev-deps steht:
          pip install pytest pytest-subtests
        env:
          POETRY_PYPI_SOURCES_PYTORCH_URL: "https://download.pytorch.org/whl/cpu"

      - name: Run unit tests (non-GUI, non-model)
        # shell: bash -> `\`-Zeilenfortsetzung funktioniert (windows-latest
        # Default-Shell ist pwsh, dort bricht `\`). `python -m pytest` statt
        # bare `pytest` -> unabhaengig davon ob das pytest-Executable im PATH
        # liegt (poetry installiert das Modul, aber das Scripts-Dir ist auf dem
        # Windows-Runner nicht zwingend im PATH).
        shell: bash
        run: |
          python -m pytest tests/test_services/ tests/test_agents/ -v --tb=short -x \
            -m "not gui and not e2e and not slow"
        env:
          QT_QPA_PLATFORM: offscreen
          PB_STUDIO_CI: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-report/
          retention-days: 7
