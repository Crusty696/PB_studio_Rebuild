name: CI

on:
  push:
    # B-037: master ergaenzt — Repo nutzt master als Default-Branch,
    # ohne diesen Eintrag lief CI bei keinem Master-Push.
    branches: ["main", "master", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint  (fast, runs on Linux, no heavy deps)
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run bandit security scan
        # B-037: ``-c bandit.yaml`` laed die Repo-Config (exclude_dirs +
        # B101-skip). ``-lll`` zeigt nur high severity — Medium-Findings
        # werden in einem separaten Sweep abgearbeitet (B-037-Folgesprint),
        # damit die Pipeline nicht sofort an Info-Findings scheitert.
        run: |
          pip install bandit
          bandit -r . -c bandit.yaml -lll

  # ──────────────────────────────────────────────
  # 2. Unit tests  (Windows, CPU-only deps)
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU-only PyTorch first
        # Avoid pulling the 5 GB CUDA wheel from the private source.
        # CPU wheel is sufficient for unit tests that mock model inference.
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies (no torch from poetry source)
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --without-extras 2>&1 | grep -v "^torch"
        env:
          POETRY_PYPI_SOURCES_PYTORCH_URL: "https://download.pytorch.org/whl/cpu"

      - name: Run unit tests (non-GUI, non-model)
        run: |
          pytest tests/test_services/ tests/test_agents/ -v --tb=short -x \
            -m "not gui and not e2e and not slow"
        env:
          QT_QPA_PLATFORM: offscreen
          PB_STUDIO_CI: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-report/
          retention-days: 7
