name: Release

on:
  push:
    tags:
      - "v*.*.*"          # e.g. v0.5.0, v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.5.0)"
        required: true
        default: "0.5.0"

jobs:
  # ──────────────────────────────────────────────
  # 1. Build (PyInstaller, Windows)
  # ──────────────────────────────────────────────
  build:
    name: Build (PyInstaller)
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CUDA-capable PyTorch (cu124)
        # GitHub Windows runners don't have CUDA drivers but the DLLs are bundled;
        # the app will fall back to CPU at runtime on machines without a GPU.
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124

      - name: Install project dependencies
        run: |
          pip install poetry pyinstaller
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: Update version in pyproject.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build with PyInstaller
        run: pyinstaller pb_studio.spec

      - name: Verify dist output
        shell: bash
        run: |
          ls dist/
          test -d dist/pb_studio || (echo "ERROR: dist/pb_studio/ not found" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pb-studio-dist-${{ steps.version.outputs.version }}
          path: dist/pb_studio/
          retention-days: 3

  # ──────────────────────────────────────────────
  # 2. Package (NSIS installer)
  # ──────────────────────────────────────────────
  package:
    name: Package (NSIS installer)
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: pb-studio-dist-${{ needs.build.outputs.version }}
          path: dist/pb_studio/

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress

      - name: Update version in NSIS script
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          sed -i "s/!define APP_VERSION .*/!define APP_VERSION \"$VERSION\"/" installer/pb_studio.nsi

      - name: Build installer
        shell: cmd
        run: |
          makensis installer\pb_studio.nsi

      - name: Verify installer
        shell: bash
        run: |
          ls dist/
          test -f "dist/pb_studio_setup_v${{ needs.build.outputs.version }}.exe" || \
            (echo "ERROR: Installer not found" && exit 1)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pb-studio-installer-${{ needs.build.outputs.version }}
          path: dist/pb_studio_setup_v${{ needs.build.outputs.version }}.exe
          retention-days: 30

  # ──────────────────────────────────────────────
  # 3. GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, package]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: pb-studio-installer-${{ needs.build.outputs.version }}
          path: release/

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate | head -20)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PB Studio v${{ needs.build.outputs.version }}
          body: |
            ## PB Studio v${{ needs.build.outputs.version }}

            ### Installation
            Download `pb_studio_setup_v${{ needs.build.outputs.version }}.exe` and run the installer.

            **Requirements:**
            - Windows 10/11 (64-bit)
            - NVIDIA GPU recommended (falls back to CPU)
            - ~2 GB disk space (AI models downloaded on first use)

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            release/pb_studio_setup_v${{ needs.build.outputs.version }}.exe
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
