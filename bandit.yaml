# B-037: Bandit-Konfiguration fuer PB Studio.
# Wird automatisch von ``bandit -c bandit.yaml ...`` gelesen.
# Format: YAML (siehe https://bandit.readthedocs.io/en/latest/config.html).

exclude_dirs:
  - .venv
  - venv
  - .venv310
  - tests          # Test-Code darf assert_used / hardcoded Pfade
  - installer      # NSIS-Hooks, externer Build-Code
  - scripts        # One-Off Maintenance-Skripte (Diagnose, Reward-Tuning)
  - outputs        # generierte/gitignored Verify-Artefakte; auf CI nicht vorhanden
  - vendor         # CPJKU/beat_this Vendoring (LOW-18) — nicht unser Code
  - .git
  - __pycache__
  - build
  - dist
  - test_db_deep.py     # standalone runner im Root, kein pytest-Test
  - e2e_direct_export.py
  - e2e_render_test.py

skips:
  # B101 — assert_used: Wir nutzen ``assert`` als precondition-check
  # in services/ (z.B. shape-Asserts vor Tensor-Ops). In Production-
  # Code mit ``python -O`` wuerden die zwar entfernt, aber kein
  # Sicherheits-Problem.
  - B101
  # B310 — urllib URL audit: 18 Aufrufe von urllib.request.urlopen
  # mit hardcoded HTTPS-URLs (HuggingFace, Ollama, GitHub-Releases).
  # Kein User-Input fliesst in die URLs. Bandit warnt allgemein vor
  # nicht-validierten Schemes (file:// etc.) — alle unsere Aufrufe
  # nutzen explicit https://. Per-line nosec waere 18 identische
  # Kommentare ohne Mehrwert; project-wide skip ist die ehrlichere
  # Dokumentation.
  - B310
  # B615 — huggingface_unsafe_download: from_pretrained() ohne revision-
  # Pin. Alle Aufrufe nutzen hardcoded, vertrauenswuerdige Model-IDs
  # (CLAP_MODEL_ID, SIGLIP2_MODEL_ID, siglip-so400m, ...). Kein User-Input
  # fliesst in den Repo-/Model-Namen. Analog zu B310 (HF-URLs) ist der
  # project-wide skip die ehrlichere Dokumentation als 4x identische nosec.
  - B615
