# PB Studio Rebuild — Conda Environment (Python 3.10 + CUDA 11.3)
# KANONISCHE INSTALL-QUELLE (Fix-Team 2026-06-12): Diese Datei + die von ihr
# referenzierte requirements-py310-cu113.txt (Versionspins) definieren das
# aktive Setup. setup_pb_studio.bat und start_pb_studio.bat nutzen das
# conda-env "pb-studio". requirements.txt = Legacy/Future, pyproject.toml =
# Tooling/Metadaten — beide sind NICHT der Install-Pfad.
#
# Zielhardware (verifiziert 2026-06-12): GTX 1060 6 GB / Surface Book 2,
# NVIDIA-Treiber 546.33 (CUDA 12.3 runtime-faehig). cu113 ist der getestete,
# aktive Torch-Stack (torch 1.12.1+cu113, Python 3.10.20). Aeltere Verweise
# auf Treiber 461.40 sind historisch.
#
# Erstellen:
#   conda env create -f environment.yml
# Aktivieren:
#   conda activate pb-studio
# Updaten:
#   conda env update -f environment.yml --prune
#
# Hintergrund: Pip-Deps liegen in `requirements-py310-cu113.txt`, das
# auch den extra-index-url fuer die cu113-Wheels enthaelt. environment.yml
# referenziert die Datei direkt, damit beide Workflows (pip-only + conda)
# dieselben Versionen ziehen.

name: pb-studio
channels:
  - conda-forge
  - nodefaults
# `defaults` (Anaconda repo) wird nicht gebraucht — Python kommt von
# conda-forge, alle anderen Deps via pip. `nodefaults` erzwingt das technisch
# (sonst zieht conda die globalen default-Channels mit rein und verlangt deren
# ToS-Akzeptanz fuer repo.anaconda.com/pkgs).

dependencies:
  - python=3.10
  - pip
  # Pip-Deps werden ueber requirements-py310-cu113.txt gezogen.
  # Die Datei enthaelt --extra-index-url fuer die cu113-Wheels.
  - pip:
      - -r requirements-py310-cu113.txt
