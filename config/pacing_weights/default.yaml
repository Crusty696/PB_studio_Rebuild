# Studio Brain — Pacing weights: DEFAULT profile (T6.3)
# Canonical 13-term scoring weights per Design §6.5.
# Used whenever no genre-specific profile applies.

w_role:       0.25
w_style:      0.15
w_mood_video: 0.10
w_mood_audio: 0.10
w_genre:      0.15
w_key:        0.10
w_tension:    0.08
w_energy:     0.15
w_spectral:   0.05
w_groove:     0.07
w_pacing:     0.08    # AV-Pacing (av_pacing_data -> pacing_fit): Aktivitaet der
                      # Musik am Cut-Punkt vs. Clip-Bewegung. Ohne Daten liefert
                      # der Term 0.5 fuer jeden Kandidaten -> reiner Offset.
w_memory:     0.20    # Confidence-gated via Wilson-Lower-Bound — actual influence
                      # scales with accumulated feedback, not weight.
w_collision:  0.10    # Penalty (subtracted).
w_freshness:  0.05    # Penalty (subtracted).
w_stem_class: 1.0     # NEUBAU-VOLLINTEGRATION T2.5.4: Stem-Klasse<->Shot-
                      # Klasse-Bonus (compute_stem_class_bonus liefert
                      # bereits 0.0/0.15, daher Gewicht 1.0).
